name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Remove bad files from history
        run: |
          # This force-removes the screenshots folder from the sync process
          rm -rf screenshots/
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote add hf https://yarin1:$HF_TOKEN@huggingface.co/spaces/yarin1/tmdb-embed-api
          # We use a 'force' push to overwrite the bad history on Hugging Face
          git push -f hf main
