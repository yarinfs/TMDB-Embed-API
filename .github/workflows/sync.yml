name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          # We create a new temporary branch without the bad history
          git checkout --orphan latest-branch
          git add -A
          git commit -m "Clean sync without screenshots"
          git remote add hf https://yarin1:$HF_TOKEN@huggingface.co/spaces/yarin1/tmdb-embed-api
          # Force push this clean branch to HF's main
          git push -f hf latest-branch:main
